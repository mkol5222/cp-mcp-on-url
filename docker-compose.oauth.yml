services:
  quantum-management-mcp:
    image: node:24
    entrypoint: npx
    environment:
      MCP_TRANSPORT_TYPE: http
      MCP_TRANSPORT_PORT: "3001"
      # S1C (cloud) auth - leave S1C_URL empty to use local management instead
      API_KEY: ${API_KEY:-}
      S1C_URL: ${S1C_URL:-}
      # Local management auth (used when S1C_URL is empty)
      MANAGEMENT_HOST: ${MANAGEMENT_HOST:-cpman.duckdns.org}
      USERNAME: ${USERNAME:-admin}
      PASSWORD: ${PASSWORD:-demo123}
    command: ["--", "npx", "@chkp/quantum-management-mcp"]

  management-logs-mcp:
    image: node:24
    entrypoint: npx
    environment:
      MCP_TRANSPORT_TYPE: http
      MCP_TRANSPORT_PORT: "3000"
      # S1C (cloud) auth - leave S1C_URL empty to use local management instead
      API_KEY: ${API_KEY:-}
      S1C_URL: ${S1C_URL:-}
      # Local management auth (used when S1C_URL is empty)
      MANAGEMENT_HOST: ${MANAGEMENT_HOST:-cpman.duckdns.org}
      USERNAME: ${USERNAME:-admin}
      PASSWORD: ${PASSWORD:-demo123}
    command: ["--", "npx", "@chkp/management-logs-mcp"]

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    environment:
      APP_URL: ${POCKET_ID_URL:-http://localhost:1411}
      TRUST_PROXY: "true"
      ALLOW_USER_SIGNUPS: "withToken"
      STATIC_API_KEY: ${POCKET_ID_STATIC_API_KEY}
    volumes:
      - pocket-id-data:/app/data
    ports:
      - "1411:1411"

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${POCKET_ID_URL:-http://pocket-id:1411}
      OAUTH2_PROXY_CLIENT_ID: ${OIDC_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: "static://200"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_REDIRECT_URL: ${OAUTH2_REDIRECT_URL}
      OAUTH2_PROXY_SCOPE: "openid email profile"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
    depends_on:
      - pocket-id

  caddy:
    image: caddy:2.11-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./conf/Caddyfile.oauth:/etc/caddy/Caddyfile
    environment:
      PROXY_API_KEY: ${PROXY_API_KEY}
    depends_on:
      - quantum-management-mcp
      - management-logs-mcp
      - oauth2-proxy

volumes:
  pocket-id-data:
